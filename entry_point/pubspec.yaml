name: entry_point
description: "Flutter mobile application — hackathon 2026."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.3.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Security / storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Navigation
  go_router: ^14.6.2

  # Media
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0

  # SVG
  flutter_svg: ^2.0.10+1

  # Brightness
  screen_brightness: ^2.0.1

  # Utils
  equatable: ^2.0.5
  intl: ^0.20.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  file_saver: ^0.3.1
  file_picker: ^10.3.10


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: RostelecomBasis
      fonts:
        - asset: assets/fonts/RostelecomBasis-Regular.otf

flutter_launcher_icons:
  image_path: "assets/icons/rostelecom_icon_1024.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icons/rostelecom_icon_1024.png"
  web:
    generate: true
    image_path: "assets/icons/rostelecom_icon_1024.png"
    background_color: "#ffffff"
    theme_color: "#7700FE"
  windows:
    generate: false
